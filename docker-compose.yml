services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: security-platform-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: securityplatform
      RABBITMQ_DEFAULT_PASS: securityplatform
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  securitycore-postgres:
    image: postgres:17
    container_name: security-platform-securitycore-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: securitycoredb
    ports:
      - "5434:5432"
    volumes:
      - securitycore_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d securitycoredb"]
      interval: 5s
      timeout: 5s
      retries: 10

  securityauth-postgres:
    image: postgres:17
    container_name: security-platform-securityauth-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: authdb
    ports:
      - "5433:5432"
    volumes:
      - securityauth_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d authdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  securitycore-api:
    build:
      context: .
      dockerfile: src/SecurityCore/SecurityCore.Api/Dockerfile
    container_name: security-platform-securitycore-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SecurityDb: Host=securitycore-postgres;Port=5432;Database=securitycoredb;Username=postgres;Password=postgres
      AuditMessaging__HostName: rabbitmq
      AuditMessaging__UserName: securityplatform
      AuditMessaging__Password: securityplatform
      AuditMessaging__QueueName: security-platform.audit-log-events
    depends_on:
      securitycore-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5136:8080"

  securityauth-api:
    build:
      context: .
      dockerfile: src/SecurityAuth/SecurityAuth.Api/Dockerfile
    container_name: security-platform-securityauth-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuthDb: Host=securityauth-postgres;Port=5432;Database=authdb;Username=postgres;Password=postgres
      AuditMessaging__HostName: rabbitmq
      AuditMessaging__UserName: securityplatform
      AuditMessaging__Password: securityplatform
      AuditMessaging__QueueName: security-platform.audit-log-events
    depends_on:
      securityauth-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5236:8080"

  securityaudit-postgres:
    image: postgres:17
    container_name: security-platform-securityaudit-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auditdb
    ports:
      - "5435:5432"
    volumes:
      - securityaudit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auditdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  securityaudit-api:
    build:
      context: .
      dockerfile: src/SecurityAudit/SecurityAudit.Api/Dockerfile
    container_name: security-platform-securityaudit-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuditDb: Host=securityaudit-postgres;Port=5432;Database=auditdb;Username=postgres;Password=postgres
      AuditMessaging__HostName: rabbitmq
      AuditMessaging__UserName: securityplatform
      AuditMessaging__Password: securityplatform
      AuditMessaging__QueueName: security-platform.audit-log-events
    depends_on:
      securityaudit-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "5336:8080"

volumes:
  securitycore_postgres_data:
  securityauth_postgres_data:
  securityaudit_postgres_data:
  rabbitmq_data:
