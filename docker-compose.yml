services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: security-platform-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: securityplatform
      RABBITMQ_DEFAULT_PASS: securityplatform
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  jaeger:
    image: jaegertracing/all-in-one:1.62
    container_name: security-platform-jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  loki:
    image: grafana/loki:3.1.0
    container_name: security-platform-loki
    command: -config.file=/etc/loki/config.yml
    ports:
      - "3100:3100"
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/config.yml:ro
      - loki_data:/loki

  promtail:
    image: grafana/promtail:3.1.0
    container_name: security-platform-promtail
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - promtail_positions:/tmp
    depends_on:
      - loki

  grafana:
    image: grafana/grafana:11.1.0
    container_name: security-platform-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - prometheus

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: security-platform-prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus

  securityaudit-postgres:
    image: postgres:17
    container_name: security-platform-securityaudit-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auditdb
    ports:
      - "5435:5432"
    volumes:
      - securityaudit_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auditdb"]
      interval: 5s
      timeout: 5s
      retries: 10

  securityaudit-api:
    build:
      context: .
      dockerfile: src/SecurityAudit/SecurityAudit.Api/Dockerfile
    container_name: security-platform-securityaudit-api
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__AuditDb: Host=securityaudit-postgres;Port=5432;Database=auditdb;Username=postgres;Password=postgres
      AuditMessaging__HostName: rabbitmq
      AuditMessaging__UserName: securityplatform
      AuditMessaging__Password: securityplatform
      AuditMessaging__QueueName: security-platform.audit-log-events
      OpenTelemetry__OtlpEndpoint: http://jaeger:4317
    depends_on:
      securityaudit-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      jaeger:
        condition: service_started
    ports:
      - "5336:8080"

volumes:
  securityaudit_postgres_data:
  rabbitmq_data:
  loki_data:
  grafana_data:
  promtail_positions:
  prometheus_data:
